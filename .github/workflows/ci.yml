name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: 'npm'
      
      - name: npm install
        run: npm ci
        
      - name: lint
        run: npm run lint --quiet --max-warnings=0

  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node-version: [ 20, 22, 24 ]
        os: [ ubuntu-latest, windows-latest ]

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup node ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: npm install
      run: npm ci
    
    - name: test
      run: npm test
      env:
        CI: true
  
  coverage:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup node 24
      uses: actions/setup-node@v3
      with:
        node-version: 24
        cache: 'npm'
    
    - name: npm install
      run: npm ci
    
    - name: Gather Coverage
      run: npm run test:coverage